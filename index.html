<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Памятники Ленину в Москве — интерактивная карта</title>
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Кластеризация маркеров -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Подключаем свои CSS и JS -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body>
<div class="map-header">
    <h1>Памятники Ленину в Москве</h1>
    <p>📌 Данные из GitHub репозитория | для информации - клик по маркеру</p>
</div>
<div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Все точки</button>
    <button class="filter-btn" data-filter="существует">🔴 Существующие</button>
    <button class="filter-btn" data-filter="утрачен">🔘 Утраченные</button>
    <button class="filter-btn reset-btn" data-filter="reset">⟳ Сбросить фильтр</button>
    <button id="toggle-list-btn" class="filter-btn" style="background: #0f1c24; margin-left: auto;">📋 Отобразить список</button>
</div>
<div class="extra-filters">
    <select id="filter-type">
        <option value="all">Тип: все</option>
        <option value="фигура">Фигура</option>
        <option value="бюст">Бюст</option>
        <option value="не указан">Не указан</option>
    </select>
    <select id="filter-material">
        <option value="all">Материал: все</option>
    </select>
    <select id="filter-sculptor">
        <option value="all">Скульптор: все</option>
    </select>
    <select id="filter-photo">
        <option value="all">Фото: все</option>
        <option value="yes">Есть фото</option>
        <option value="no">Нет фото</option>
    </select>
</div>
<div id="map"></div>
<div class="footer-note">Источник: GitHub | Всего точек: <span id="totalCount">0</span></div>
<div id="loading-overlay" class="loading-overlay"><div>📡 Загрузка данных из репозитория...</div><div style="font-size:0.8rem;">Пожалуйста, подождите</div></div>

<!-- Боковая панель со списком -->
<div id="list-sidebar" class="list-sidebar hidden">
    <div class="sidebar-header">
        <h3>Список памятников</h3>
        <button id="close-sidebar-btn" class="close-sidebar-btn">✕</button>
    </div>
    <div class="sidebar-search">
        <input type="text" id="list-search-input" placeholder="🔍 Поиск по названию или адресу...">
    </div>
    <div id="list-container" class="list-container">
        <!-- сюда динамически генерируются карточки -->
        <div class="loading-placeholder">Загрузка...</div>
    </div>
</div>
</body>
</html>
