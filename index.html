<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<link rel="icon" type="image/svg+xml" href="data/assets/favicon.svg">
    <title>Памятники Ленину в Москве — интерактивная карта</title>
    <!-- Leaflet CSS + JS (cdnjs) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <!-- Кластеризация маркеров (cdnjs) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
    <!-- Подключаем свои CSS и JS -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/script.js" defer></script>
    <script src="js/test.js" defer></script>
    <script src="js/router.js" defer></script>
</head>
<body>
<div class="map-header">
    <h1>Памятники Ленину в Москве</h1>
    <p>📌 данные взяты из 
        <a href="https://web.archive.org/web/20250613224843/http://leninstatues.ru/moscow" target="_blank" rel="noopener noreferrer">leninstatues.ru</a>, 
        <a href="https://yandex.ru/maps/" target="_blank" rel="noopener noreferrer">yandex.ru/maps</a>, 
        <a href="https://wikimapia.org/" target="_blank" rel="noopener noreferrer">wikimapia.org</a> и 
        <a href="https://pastvu.com/" target="_blank" rel="noopener noreferrer">pastvu.com</a>
    </p>
</div>
<button id="collapse-toggle-btn" class="filter-btn collapse-float">▲ Свернуть</button>
<div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Все точки</button>
    <button class="filter-btn" data-filter="существует">🔴 Существует</button>
    <button class="filter-btn" data-filter="утрачен">🔘 Утрачен</button>
    <button class="filter-btn reset-btn" data-filter="reset">⟳ Сбросить</button>
    <button id="start-test-btn" class="filter-btn" style="margin-left: auto;">🎯 Пройти тест</button>
	<button id="toggle-list-btn" class="filter-btn" style="margin-left: 8px;">📋 Список</button>
</div>
<div class="extra-filters">
    <select id="filter-type">
        <option value="all">Тип: все</option>
        <option value="фигура">Фигура</option>
        <option value="бюст">Бюст</option>
        <option value="не указан">Не указан</option>
    </select>
    <select id="filter-material">
        <option value="all">Материал: все</option>
    </select>
    <select id="filter-sculptor">
        <option value="all">Скульптор: все</option>
    </select>
    <select id="filter-photo">
        <option value="all">Фото: все</option>
        <option value="yes">Есть фото</option>
        <option value="no">Нет фото</option>
    </select>
</div>
<div id="map"></div>
<div class="footer-note">Источник: GitHub | Всего точек: <span id="totalCount">0</span></div>
<div id="loading-overlay" class="loading-overlay"><div>📡 Загрузка данных из репозитория...</div><div style="font-size:0.8rem;">Пожалуйста, подождите</div></div>

<!-- Боковая панель со списком -->
<div id="list-sidebar" class="list-sidebar hidden">
    <div class="sidebar-header">
        <h3>Список памятников</h3>
        <button id="close-sidebar-btn" class="close-sidebar-btn">✕</button>
    </div>
    <div class="sidebar-search">
        <input type="text" id="list-search-input" placeholder="🔍 Поиск по названию или адресу...">
    </div>
    <div id="list-container" class="list-container">
        <div class="loading-placeholder">Загрузка...</div>
    </div>
</div>

<!-- Модальное окно викторины -->
<div id="quiz-modal" class="quiz-modal" style="display: none;">
    <div class="quiz-modal-content">
        <span class="quiz-close-btn">&times;</span>
        <h2>🧠 Насколько хорошо ты знаешь памятники Ленину в Москве?</h2>
        
        <!-- Шкала прогресса -->
        <div class="quiz-progress" id="quiz-progress"></div>

        <!-- Контейнер вопроса -->
		<div id="quiz-question-container" class="quiz-question-container">
			<div class="quiz-photo-wrapper">
				<img id="quiz-photo" class="quiz-photo" src="" alt="Памятник Ленину">
				<!-- Блок фидбека теперь внутри обёртки, поверх фото -->
				<div id="quiz-feedback" class="quiz-feedback" style="display: none;"></div>
			</div>
			<div class="quiz-options" id="quiz-options"></div>
		</div>
        <!-- Экран результатов (скрыт до завершения) -->
        <div id="quiz-result-screen" class="quiz-result-screen" style="display: none;">
            <div class="quiz-result-score" id="quiz-result-score"></div>
            <div class="quiz-result-phrase" id="quiz-result-phrase"></div>
            <button id="quiz-retry-btn" class="filter-btn" style="margin-top: 20px;">🔄 Пройти заново</button>
        </div>
    </div>
</div>

</body>
</html>
